<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meridian</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js"></script>
<style>
:root {
  --bg0:#09111f;--bg1:#0f172a;--bg2:#1a2236;--bg3:#243049;--bg4:#2d3a57;
  --bdr:rgba(148,163,184,.08);--bdr2:rgba(148,163,184,.15);
  --t0:#eef2ff;--t1:#c7d2fe;--t2:#94a3b8;--t3:#64748b;
  --ind:#818cf8;--ind2:#6366f1;--cyn:#38bdf8;--cyn2:#0ea5e9;
  --pur:#a78bfa;--grn:#4ade80;--amb:#fbbf24;--ros:#fb7185;
  --ab:rgba(129,140,248,.12);--ab2:rgba(129,140,248,.22);
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--disp:'Fraunces',Georgia,serif;
  --nh:0px;--th:54px;--r:10px;--rl:16px;--rx:24px;
  --p1:#f87171;--p2:#fb923c;--p3:#facc15;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg0)}
body{color:var(--t0);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg1);position:relative}

/* topbar */
.topbar{height:var(--th);display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--bg1);z-index:10}
.tb-l{display:flex;align-items:center;gap:8px;min-width:0}
.vault-name{font-family:var(--disp);font-style:italic;font-size:16px;color:var(--t1)}
.tb-r{display:flex;align-items:center;gap:2px;flex-shrink:0}
.ib{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:background .15s,color .15s;flex-shrink:0}
.ib:hover{background:var(--bg3);color:var(--t0)}
.ib svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* views */
.view{flex:1;overflow:hidden;display:none;flex-direction:column}
.view.active{display:flex}

/* ── UNDO TOAST + FAB FLOAT ROW ── */
/* Both sit above the nav bar in a flex row, left-aligned toast + right FAB */
.bottom-float{
  position:absolute;
  bottom:calc(var(--nh) + 14px);
  left:14px;right:14px;
  display:flex;align-items:center;gap:10px;
  pointer-events:none;
  z-index:50;
}
.undo-toast{
  flex:1;min-width:0;
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r);
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  pointer-events:all;
  transition:opacity .25s ease,transform .25s ease;
}
.undo-toast.hiding{opacity:0;transform:translateY(8px)}
.undo-toast-msg{flex:1;font-size:13px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.undo-btn{font-size:12px;font-weight:700;color:var(--ind);padding:4px 10px;border-radius:20px;background:var(--ab);flex-shrink:0;cursor:pointer}
.undo-btn:hover{background:var(--ab2)}

/* ── SIDEBAR ── */
.sidebar-ov{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:80;opacity:0;pointer-events:none;transition:opacity .22s ease}
.sidebar-ov.open{opacity:1;pointer-events:all}
.sidebar{position:absolute;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--bdr2);z-index:81;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sidebar-head{height:var(--th);display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.sidebar-head svg{width:26px;height:26px;flex-shrink:0}
.sidebar-title{font-family:var(--disp);font-style:italic;font-size:16px;color:var(--t1)}
.sidebar-body{flex:1;overflow-y:auto;padding:8px 0}
.sni{width:100%;display:flex;align-items:center;gap:14px;padding:13px 20px;font-size:14px;font-weight:500;color:var(--t2);transition:background .12s,color .12s;text-align:left}
.sni svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.7;flex-shrink:0}
.sni.active{color:var(--ind);background:var(--ab)}
.sni:hover{background:var(--bg3)}

/* FAB — lives inside .bottom-float flex row */
.fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--ind2),var(--cyn2));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 24px rgba(99,102,241,.45);transition:transform .2s,box-shadow .2s;flex-shrink:0}
.fab:hover{transform:scale(1.06);box-shadow:0 6px 28px rgba(99,102,241,.6)}
.fab:active{transform:scale(.93)}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ── AGENDA ── */
.ag-sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ag-pad{padding-bottom:100px}
.day-section{scroll-margin-top:8px}
.day-lbl{padding:14px 14px 5px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg1);z-index:3}
.day-lbl.tl{color:var(--ind)}
.day-lbl::after{content:'';flex:1;height:1px;background:var(--bdr)}
.occ-row{display:flex;align-items:flex-start;gap:9px;padding:8px 14px;cursor:pointer;transition:background .1s}
.occ-row:hover{background:var(--bg2)}
.occ-row.is-done{opacity:.5}
/* left: time col */
.occ-left{width:48px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:1px;padding-top:3px}
.occ-time{font-size:11px;font-family:var(--mono);color:var(--t3);letter-spacing:.02em;line-height:1.2}
.occ-time.timed{color:var(--cyn)}
.occ-dur-small{font-size:9px;font-family:var(--mono);color:var(--t3);opacity:.75}
/* bar — color by state */
.occ-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:20px;background:var(--bg4)}
.occ-bar.event-future{background:linear-gradient(to bottom,var(--ind),var(--pur))}
.occ-bar.task-open{background:var(--grn)}
.occ-bar.task-p1{background:var(--p1)}
.occ-bar.task-p2{background:var(--p2)}
.occ-bar.task-p3{background:var(--p3)}
.occ-bar.done,.occ-bar.event-past{background:var(--bg4)}
/* body */
.occ-body{flex:1;min-width:0}
.occ-tr{display:flex;align-items:center;gap:6px}
.occ-title{font-size:14px;font-weight:500;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.occ-title.done-t{text-decoration:line-through;color:var(--t3)}
/* recur badge — inline after title */
.orecur{display:inline-flex;align-items:center;margin-left:4px;opacity:.45;flex-shrink:0;vertical-align:middle}
.orecur svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2}
.occ-meta{display:flex;align-items:center;gap:5px;margin-top:2px;flex-wrap:wrap}
.otag{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--bg3);color:var(--t3)}
.otag.ev{background:rgba(129,140,248,.15);color:var(--ind)}
.orecur svg{width:11px;height:11px;stroke:var(--t3);fill:none;stroke-width:2}
.occ-chk{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:background .15s,border-color .15s}
.occ-chk svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2.5;opacity:0;transition:opacity .15s}
.occ-chk.done{background:var(--grn);border-color:var(--grn)}
.occ-chk.done svg{opacity:1}
@keyframes cp{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}
.occ-chk.pop{animation:cp .22s ease}
.multiday-banner{margin:2px 14px;background:rgba(129,140,248,.18);border:1px solid rgba(129,140,248,.3);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--ind);display:flex;align-items:center;gap:6px;cursor:pointer}
.multiday-banner svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}

/* ── MONTH — full height ── */
.cal-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cal-hdr{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cal-mt{font-family:var(--disp);font-size:20px;font-weight:300;color:var(--t0)}
.cal-mt em{font-style:italic;color:var(--ind)}
.mnav{display:flex;align-items:center;gap:2px}
.mnb{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:background .12s}
.mnb:hover{background:var(--bg3)}
.mnb svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);padding:0 4px;flex-shrink:0}
.dow-c{text-align:center;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);padding:3px 0}
.cal-grid-wrap{flex:1;overflow:hidden;padding:0 4px 4px;display:flex;flex-direction:column}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1}
.cal-cell{display:flex;flex-direction:column;padding:3px 2px 2px;border-radius:var(--r);cursor:pointer;transition:background .1s;overflow:hidden;min-height:0}
.cal-cell:hover{background:var(--bg3)}
.cal-cell.other{opacity:.25}
.cal-cell.istoday .ccn{background:var(--ind);color:#fff;font-weight:700}
.ccn{font-size:11px;font-weight:500;color:var(--t2);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;margin-bottom:1px}
.cc-bars{display:flex;flex-direction:column;gap:1px;flex:1;overflow:hidden}
.cc-bar{border-radius:3px;padding:1px 4px;font-size:8px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;flex-shrink:0}
.cc-bar.event{background:rgba(129,140,248,.25);color:var(--ind)}
.cc-bar.task{background:rgba(74,222,128,.2);color:var(--grn)}
.cc-bar.task-p1{background:rgba(248,113,113,.2);color:var(--p1)}
.cc-bar.task-p2{background:rgba(251,146,60,.2);color:var(--p2)}
.cc-bar.task-p3{background:rgba(250,204,21,.2);color:var(--p3)}
.cc-bar.done{background:var(--bg3);color:var(--t3);text-decoration:line-through}
.cc-bar.multiday{background:rgba(129,140,248,.35);color:#a5b4fc}
.cc-more{font-size:8px;color:var(--t3);padding:0 2px}

/* ── DAY VIEW ── */
.dv-allday{padding:6px 12px;border-bottom:1px solid var(--bdr2);background:var(--bg2);flex-shrink:0}
.dv-adlbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.dv-aditem{border-radius:5px;padding:3px 9px;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;cursor:pointer;display:flex;align-items:center;gap:6px}
.dv-aditem.event{background:rgba(129,140,248,.2);color:var(--ind)}
.dv-aditem.task{background:rgba(74,222,128,.15);color:var(--grn)}
.dv-aditem.task-p1{background:rgba(248,113,113,.15);color:var(--p1)}
.dv-aditem.task-p2{background:rgba(251,146,60,.15);color:var(--p2)}
.dv-aditem.task-p3{background:rgba(250,204,21,.15);color:var(--p3)}
.dv-aditem.past{background:var(--bg3);color:var(--t3)}
.dv-aditem.done{background:var(--bg3);color:var(--t3)}
.dv-aditem.multiday{background:rgba(165,180,252,.25);color:#a5b4fc}
.dv-aditem .dv-chk{width:14px;height:14px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7}
.dv-aditem .dv-chk svg{width:8px;height:8px;stroke:#fff;fill:none;stroke-width:2.5;opacity:0}
.dv-aditem .dv-chk.done{background:var(--grn);border-color:var(--grn);opacity:1}
.dv-aditem .dv-chk.done svg{opacity:1}
.dv-sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.dv-tl{position:relative;padding:0 0 60px;min-height:900px}
.dv-hr{display:flex;align-items:flex-start;height:56px;position:relative}
.dv-hlbl{width:46px;font-size:10px;font-family:var(--mono);color:var(--t3);text-align:right;padding-right:10px;flex-shrink:0;margin-top:-6px}
.dv-hline{flex:1;border-top:1px solid var(--bdr);position:relative}
.dv-eblk{position:absolute;border-radius:7px;padding:5px 8px;font-size:12px;font-weight:500;overflow:hidden;cursor:pointer;transition:opacity .15s;left:50px;right:6px}
.dv-eblk:hover{opacity:.85}
.dv-eblk.event{background:rgba(99,102,241,.35);border-left:3px solid var(--ind);color:var(--t1)}
.dv-eblk.past{background:var(--bg3);border-left:3px solid var(--bg4);color:var(--t3)}
.dv-eblk.task{background:rgba(74,222,128,.18);border-left:3px solid var(--grn);color:var(--grn)}
.dv-eblk.task-p1{background:rgba(248,113,113,.18);border-left:3px solid var(--p1);color:var(--p1)}
.dv-eblk.task-p2{background:rgba(251,146,60,.18);border-left:3px solid var(--p2);color:var(--p2)}
.dv-eblk.task-p3{background:rgba(250,204,21,.18);border-left:3px solid var(--p3);color:var(--p3)}
.dv-eblk.done{background:var(--bg3);border-left:3px solid var(--bg4);color:var(--t3)}
.dv-et{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.dv-em{font-size:10px;font-family:var(--mono);opacity:.7;margin-top:1px}
.dv-blk-chk{width:12px;height:12px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dv-blk-chk svg{width:7px;height:7px;stroke:currentColor;fill:none;stroke-width:2.5;opacity:0}
.dv-blk-chk.done{background:var(--grn);border-color:var(--grn)}
.dv-blk-chk.done svg{opacity:1}
.now-line{position:absolute;left:46px;right:0;height:2px;background:var(--ros);z-index:5;border-radius:1px}
.now-dot{position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--ros)}

/* ── SEARCH ── */
.ns-bar{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r);padding:9px 13px;margin:12px}
.ns-bar input{flex:1;background:none;border:none;outline:none;color:var(--t0);font-size:14px}
.ns-bar input::placeholder{color:var(--t3)}
.ns-bar svg{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2;flex-shrink:0}
.ns-filters{display:flex;gap:5px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none}
.fchip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg3);color:var(--t2);border:1px solid var(--bdr2);cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0}
.fchip.on{background:var(--ab2);color:var(--ind);border-color:var(--ind)}
.ns-sc{flex:1;overflow-y:auto}
.ns-pad{padding-bottom:80px}
.ns-sec{padding:10px 14px 3px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.note-row{padding:12px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--bdr)}
.note-row:hover{background:var(--bg2)}
.nr-t{font-size:14px;font-weight:500;color:var(--t0);margin-bottom:3px}
.nr-p{font-size:12px;color:var(--t3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nr-m{display:flex;gap:5px;margin-top:4px;align-items:center}
.nr-d{font-size:11px;color:var(--t3);font-family:var(--mono)}

/* ── ENTRY EDITOR ── */
.entry-top{height:var(--th);display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--bg1)}
.entry-fname{flex:1;font-family:var(--mono);font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.save-btn{font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--ind2),var(--cyn2));padding:6px 16px;border-radius:20px;box-shadow:0 2px 12px rgba(99,102,241,.3)}
.entry-sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.entry-pad{padding:18px 14px 120px}
.entry-title-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.echk{width:24px;height:24px;border-radius:50%;border:2px solid var(--bg4);display:none;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;cursor:pointer;transition:all .15s}
.echk.show{display:flex}
.echk svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;opacity:0}
.echk.on{background:var(--grn);border-color:var(--grn)}
.echk.on svg{opacity:1}
.entry-title-in{flex:1;font-family:var(--disp);font-size:22px;font-weight:300;color:var(--t0);background:none;border:none;outline:none;line-height:1.3;resize:none;min-height:36px}
.entry-title-in::placeholder{color:var(--t3)}
.prop-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pchip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg3);border:1px solid var(--bdr2);color:var(--t2);cursor:pointer;transition:all .14s;white-space:nowrap}
.pchip svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.pchip.on{background:var(--ab2);border-color:var(--ind);color:var(--ind)}
.pchip.on.tc{background:rgba(74,222,128,.15);border-color:var(--grn);color:var(--grn)}
.pchip.on.p1{background:rgba(248,113,113,.15);border-color:var(--p1);color:var(--p1)}
.pchip.on.p2{background:rgba(251,146,60,.15);border-color:var(--p2);color:var(--p2)}
.pchip.on.p3{background:rgba(250,204,21,.15);border-color:var(--p3);color:var(--p3)}
.pchip.hidden{display:none}
.pchip-sum{font-size:11px;font-family:var(--mono);opacity:.8;margin-left:1px}
.entry-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;align-items:center}
.etag{background:var(--bg3);border:1px solid var(--bdr2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--t2)}
.etag-add{color:var(--ind);border-color:var(--ind);background:var(--ab);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.etag-add svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5}
.entry-divider{height:1px;background:var(--bdr);margin-bottom:14px}
.entry-body{min-height:160px;color:var(--t1);font-size:14px;line-height:1.85;outline:none;caret-color:var(--ind);white-space:pre-wrap;word-break:break-word;position:relative}
.entry-body .wl{color:var(--ind);border-bottom:1px solid rgba(129,140,248,.35);cursor:pointer}
.entry-body .wl-broken{color:var(--ros);border-bottom:1px solid rgba(251,113,133,.3)}

/* wikilink popup */
.wl-popup{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:500;min-width:210px;max-height:200px;overflow-y:auto;display:none;position:fixed}
.wl-popup.show{display:block}
.wl-item{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--t1);transition:background .1s;display:flex;align-items:center;gap:8px}
.wl-item:hover,.wl-item.focused{background:var(--bg3)}
.wl-item svg{width:13px;height:13px;stroke:var(--t3);fill:none;stroke-width:1.8;flex-shrink:0}

/* ── DIALOGS ── */
.dlg-ov{position:fixed;inset:0;background:rgba(9,17,31,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.dlg-ov.open{opacity:1;pointer-events:all}
.dlg{width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--bdr2);border-radius:var(--rx) var(--rx) 0 0;padding:12px 0 40px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.dlg-ov.open .dlg{transform:translateY(0)}
.dlg-handle{width:34px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 14px}
.dlg-title{font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);padding:0 18px 10px;border-bottom:1px solid var(--bdr);margin-bottom:8px}
.dlg-body{padding:0 16px}
.dlg-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bdr)}
.dlg-row:last-of-type{border:none}
.dlg-lbl{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:7px}
.dlg-lbl svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.dlg-in{background:var(--bg3);border:1px solid transparent;border-radius:8px;padding:7px 11px;font-size:13px;font-family:var(--mono);color:var(--t0);outline:none;transition:border-color .15s}
.dlg-in:focus{border-color:var(--ind)}
.dlg-in::placeholder{color:var(--t3)}
.dlg-hint{font-size:11px;color:var(--t3);margin:0 0 10px;line-height:1.5;background:var(--bg3);border-radius:8px;padding:8px 12px;display:flex;gap:7px;align-items:flex-start}
.dlg-hint svg{width:13px;height:13px;stroke:var(--ind);fill:none;stroke-width:2;flex-shrink:0;margin-top:1px}
.dlg-actions{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--bdr)}
.dlg-rm{font-size:12px;color:var(--ros);padding:8px 12px;border-radius:20px;display:flex;align-items:center;gap:4px}
.dlg-rm svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.dlg-cancel{font-size:13px;color:var(--t3);padding:8px 14px;border-radius:20px}
.dlg-ok{font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--ind2),var(--cyn2));padding:8px 20px;border-radius:20px}
.recur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.ro{padding:8px 4px;border-radius:8px;background:var(--bg3);border:1px solid var(--bdr2);font-size:12px;color:var(--t2);text-align:center;cursor:pointer;transition:all .12s}
.ro.on{background:var(--ab2);border-color:var(--ind);color:var(--ind)}
.wd-row{display:flex;gap:4px;margin:8px 0}
.wd{flex:1;padding:7px 0;border-radius:7px;background:var(--bg3);border:1px solid var(--bdr2);font-size:11px;color:var(--t2);text-align:center;cursor:pointer;transition:all .12s}
.wd.on{background:var(--ab2);border-color:var(--ind);color:var(--ind);font-weight:600}
.monthly-opts{display:flex;flex-direction:column;gap:5px;margin:8px 0}
.mopt{padding:9px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--bdr2);font-size:12px;color:var(--t2);cursor:pointer;text-align:left;transition:all .12s}
.mopt.on{background:var(--ab2);border-color:var(--ind);color:var(--ind)}
.end-sec{margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
.end-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.end-opts{display:flex;gap:6px;margin-bottom:8px}
.eopt{padding:5px 12px;border-radius:20px;font-size:12px;background:var(--bg3);border:1px solid var(--bdr2);color:var(--t2);cursor:pointer;transition:all .12s}
.eopt.on{background:var(--ab2);border-color:var(--ind);color:var(--ind)}
.interval-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.interval-row span{font-size:12px;color:var(--t2)}

/* scope selector — compact dropdown */
.scope-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:7px 12px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r)}
.scope-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);white-space:nowrap}
.scope-select{flex:1;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:5px 8px;font-size:12px;font-weight:500;color:var(--ind);cursor:pointer;outline:none;font-family:var(--font);transition:border-color .12s}
.scope-select:focus{border-color:var(--ind)}
.sheet-opt{display:flex;align-items:center;gap:14px;width:100%;padding:14px 18px;cursor:pointer;transition:background .1s;text-align:left;border-bottom:1px solid var(--bdr)}
.sheet-opt:last-child{border:none}
.sheet-opt:hover{background:var(--bg3)}
.sheet-opt>svg{width:20px;height:20px;stroke:var(--ind);fill:none;stroke-width:1.8;flex-shrink:0}
.sopt-t{font-size:14px;font-weight:500;color:var(--t0);margin-bottom:2px}
.sopt-s{font-size:12px;color:var(--t3)}

/* ── SWIPE GESTURES ── */
.swipe-wrap{position:relative;overflow:hidden;border-radius:4px}
.swipe-hint{position:absolute;inset:0;display:flex;align-items:center;padding:0 20px;pointer-events:none;z-index:0}
.swipe-hint.left{background:var(--ros);justify-content:flex-end;gap:10px}
.swipe-hint svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;flex-shrink:0;transition:transform .15s}
.swipe-hint span{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.swipe-hint.ready svg{transform:scale(1.3)}
.swipe-row{position:relative;z-index:1;background:var(--bg1);touch-action:pan-y;user-select:none;-webkit-user-select:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.occ-row{animation:fadeUp .16s ease both}
</style>
</head>

// ── SPEC EXPANSION ENGINE (v0.9) ─────────────────────────────
// Implements §9 of the spec.
// Nodes use: date (YYYY-MM-DD string), time ("HH:MM" string, optional),
// timezone (IANA string, optional). No Date objects at the node level.
// Occurrences carry a JS Date in `.time` for internal calendar math.

const WDAYS_MAP={su:0,mo:1,tu:2,we:3,th:4,fr:5,sa:6};

// Build a JS Date from spec node fields (date + optional time string).
// All dates treated as local time (no UTC shift). §4.3 — timezone is a
// consumer display concern; we use local time internally for simplicity.
function nodeDateTime(nodeOrInst){
  const dateStr=nodeOrInst.date;
  const timeStr=nodeOrInst.time; // "HH:MM" string or undefined
  if(!dateStr)return null;
  const dm=String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!dm)return null;
  const [,y,mo,d]=dm.map(Number);
  if(timeStr){
    const tm=String(timeStr).match(/^(\d{1,2}):(\d{2})/);
    if(tm)return new Date(y,mo-1,d,+tm[1],+tm[2],0,0);
  }
  return new Date(y,mo-1,d,0,0,0,0);
}

// Convert a JS Date back to spec date/time strings
function jsDateToSpec(jsDate){
  if(!jsDate||isNaN(jsDate))return {date:null,time:null};
  const date=`${jsDate.getFullYear()}-${String(jsDate.getMonth()+1).padStart(2,'0')}-${String(jsDate.getDate()).padStart(2,'0')}`;
  const h=jsDate.getHours(),m=jsDate.getMinutes();
  const time=(h||m)?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`:null;
  return {date,time};
}

// Parse date-only string as local-time JS Date (backward compat)
function parseDateString(s){
  if(!s)return null;
  if(s instanceof Date)return isNaN(s)?null:s;
  const dm=String(s).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(dm)return new Date(+dm[1],+dm[2]-1,+dm[3]);
  const d=new Date(s);
  return isNaN(d)?null:d;
}

// Legacy helper — used for multiday end dates and end.date in repeat
function toDate(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v;
  return parseDateString(String(v));
}

function addInterval(date, intervalStr){
  const d=new Date(date);
  const m=intervalStr.match(/(\d+)\s*(day|week|hour|minute|month|year)s?/i);
  if(!m)return d;
  const n=parseInt(m[1]);
  const unit=m[2].toLowerCase();
  if(unit==='day')d.setDate(d.getDate()+n);
  else if(unit==='week')d.setDate(d.getDate()+n*7);
  else if(unit==='hour')d.setHours(d.getHours()+n);
  else if(unit==='minute')d.setMinutes(d.getMinutes()+n);
  else if(unit==='month')d.setMonth(d.getMonth()+n);
  else if(unit==='year')d.setFullYear(d.getFullYear()+n);
  return d;
}

function mergeNode(parent, child){
  // Structural merge per spec §3 — date, time, timezone merge independently
  const merged={...parent};
  for(const [k,v] of Object.entries(child)){
    if(k==='instances')continue; // §3.2: not inherited
    if(v&&typeof v==='object'&&!Array.isArray(v)&&v.type!==undefined){
      merged[k]=v; // sum type — replace entirely
    } else if(v&&typeof v==='object'&&!Array.isArray(v)){
      merged[k]=mergeNode(merged[k]||{},v); // product type dict — recursive merge
    } else {
      merged[k]=v; // scalar — override independently (covers date, time, timezone)
    }
  }
  return merged;
}

function generateScheduledDates(anchor, anchorTimeStr, sched, from, to){
  // anchor: JS Date (the anchor datetime)
  // anchorTimeStr: "HH:MM" or null (the time component to carry forward)
  const {freq, byweekday, bymonthday, bysetpos, interval=1, end} = sched;
  const results=[];
  const maxDate=end?.type==='until'?toDate(end.date||end.time)||to:to;
  let maxCount=end?.type==='count'?end.occurrences:Infinity;
  let count=0;

  // Apply time-of-day to a date (carries the series time component forward)
  function withTime(d){
    const r=new Date(d);
    if(anchorTimeStr){
      const tm=String(anchorTimeStr).match(/^(\d{1,2}):(\d{2})/);
      if(tm){r.setHours(+tm[1],+tm[2],0,0);}
    } else {
      r.setHours(0,0,0,0);
    }
    return r;
  }

  function nextBase(d){
    const n=new Date(d);
    if(freq==='daily')n.setDate(n.getDate()+interval);
    else if(freq==='weekly')n.setDate(n.getDate()+7*interval);
    else if(freq==='monthly')n.setMonth(n.getMonth()+interval);
    else if(freq==='yearly')n.setFullYear(n.getFullYear()+interval);
    return n;
  }

  function matchesInPeriod(periodStart){
    const dates=[];
    if(freq==='daily'){
      dates.push(withTime(periodStart));
    } else if(freq==='weekly'){
      if(!byweekday||!byweekday.length){dates.push(withTime(periodStart));}
      else{
        const wd=periodStart.getDay();
        const mondayOff=(wd===0)?-6:(1-wd);
        const weekStart=new Date(periodStart);
        weekStart.setDate(periodStart.getDate()+mondayOff);
        for(const dStr of byweekday){
          const target=WDAYS_MAP[dStr.toLowerCase()]||0;
          const dayCandidate=new Date(weekStart);
          dayCandidate.setDate(weekStart.getDate()+(target===0?6:target-1));
          dates.push(withTime(dayCandidate));
        }
      }
    } else if(freq==='monthly'){
      if(bymonthday&&bymonthday.length){
        for(const mday of bymonthday){
          dates.push(withTime(new Date(periodStart.getFullYear(),periodStart.getMonth(),mday)));
        }
      } else if(byweekday&&byweekday.length&&bysetpos!==undefined){
        const month=periodStart.getMonth(),year=periodStart.getFullYear();
        const candidates=[];
        const daysInMonth=new Date(year,month+1,0).getDate();
        const targetDays=byweekday.map(d=>WDAYS_MAP[d.toLowerCase()]||0);
        for(let day=1;day<=daysInMonth;day++){
          const d2=new Date(year,month,day);
          if(targetDays.includes(d2.getDay()))candidates.push(d2);
        }
        const pos=bysetpos<0?candidates.length+bysetpos:bysetpos-1;
        if(candidates[pos])dates.push(withTime(candidates[pos]));
      } else {
        dates.push(withTime(new Date(periodStart.getFullYear(),periodStart.getMonth(),anchor.getDate())));
      }
    } else if(freq==='yearly'){
      dates.push(withTime(new Date(periodStart.getFullYear(),anchor.getMonth(),anchor.getDate())));
    }
    return dates;
  }

  let cursor=new Date(anchor);
  const LIMIT=500; let iter=0;
  while(cursor<=maxDate&&count<maxCount&&iter++<LIMIT){
    const dates=matchesInPeriod(cursor).filter(d=>d>anchor&&d>=from&&d<=maxDate&&d<=to);
    for(const d of dates.sort((a,b)=>a-b)){
      if(d>anchor&&count<maxCount){results.push(d);count++;}
    }
    cursor=nextBase(cursor);
    if(cursor>maxDate||cursor>to)break;
  }
  return results;
}

function expandNode(node, from, to){
  const occurrences=[];
  const anchor=nodeDateTime(node);
  if(!anchor)return occurrences;

  // Build instance override list for §4.4 matching
  // A child with only `date` matches any occurrence on that calendar day.
  // A child with `date` + `time` matches within 60 seconds.
  const instanceOverrides=(node.instances||[]).map(child=>{
    const t=nodeDateTime(child);
    if(!t&&!child.date)return null;
    // Use date-only matching if child has no time field
    const hasTime=!!(child.time);
    const matchDate=child.date?parseDateString(child.date):t;
    return {
      ms:t?t.getTime():matchDate?matchDate.getTime():0,
      hasTime,
      matchDate,
      child,
      eff:mergeNode(node,child)
    };
  }).filter(Boolean);

  function findOverride(jsDate){
    for(const o of instanceOverrides){
      if(!o.hasTime){
        // Date-only: match any occurrence on that calendar day (§4.4)
        const od=o.matchDate;
        if(od&&od.getFullYear()===jsDate.getFullYear()&&od.getMonth()===jsDate.getMonth()&&od.getDate()===jsDate.getDate())return o;
      } else {
        // Date+time: match within 60 seconds
        if(Math.abs(o.ms-jsDate.getTime())<60000)return o;
      }
    }
    return null;
  }

  // Build occurrence object from effective node + JS Date
  function makeOcc(eff, jsDate, baseNode, instOverride){
    if(eff.excluded)return null;
    const occTimeStr=eff.time||baseNode.time||node.time||null;
    // Always derive date from the actual occurrence JS Date.
    // Only use eff.date when there's an explicit instance override that rescheduled to a different date.
    const occDate=(instOverride&&instOverride.child.date&&instOverride.child.date!==node.date)
      ? instOverride.child.date
      : jsDateToSpec(jsDate).date;
    return {
      title:eff.title||node.title,
      date:occDate,
      time:occTimeStr,
      timezone:eff.timezone||node.timezone,
      jsTime:jsDate, // internal JS Date for calendar math
      duration:eff.duration||node.duration,
      done:eff.done,
      priority:eff.priority||node.priority,
      tags:eff.tags||[],
      type:eff.type||(eff.done!==undefined?'task':'event'),
      body:eff.body,
      multiday:eff.multiday,
      recur:true,
      _nodeId:node.id,
      _node:node,
    };
  }

  // Emit anchor (step 2) — skip for after_completion (that branch handles all)
  if(node.repeat?.type!=='after_completion'){
    if(anchor>=from&&anchor<=to){
      const ov=findOverride(anchor);
      const occ=makeOcc(ov?ov.eff:node, anchor, node, ov);
      if(occ)occurrences.push(occ);
    }
  }

  if(!node.repeat)return occurrences;

  if(node.repeat.type==='schedule'){
    const sched=node.repeat.scheduled||{};
    const generated=generateScheduledDates(anchor, node.time, sched, from, to);
    const generatedMs=new Set(generated.map(d=>d.getTime()));
    generatedMs.add(anchor.getTime());

    for(const genDate of generated){
      const ov=findOverride(genDate);
      const effNode=ov?ov.eff:node;
      const occ=makeOcc(effNode, genDate, node, ov);
      if(occ)occurrences.push(occ);
    }

    // Emit one-off instances (§9.2 step 5): child date/time not matching any generated slot
    for(const inst of (node.instances||[])){
      if(inst.excluded)continue;
      const t=nodeDateTime(inst);
      if(!t)continue;
      // Check if this matches any generated date (using same §4.4 tolerance)
      let isGenerated=false;
      if(!inst.time){
        // Date-only — check if any generated date falls on same calendar day
        isGenerated=[...generatedMs].some(ms=>{
          const gd=new Date(ms);
          return gd.getFullYear()===t.getFullYear()&&gd.getMonth()===t.getMonth()&&gd.getDate()===t.getDate();
        });
      } else {
        isGenerated=[...generatedMs].some(ms=>Math.abs(ms-t.getTime())<60000);
      }
      if(!isGenerated&&t>=from&&t<=to){
        const eff=mergeNode(node,inst);
        if(!eff.excluded){
          occurrences.push({
            title:eff.title||node.title,
            date:inst.date||jsDateToSpec(t).date,
            time:eff.time||node.time||null,
            timezone:eff.timezone||node.timezone,
            jsTime:t,
            duration:eff.duration||node.duration,
            done:inst.done,
            tags:eff.tags||node.tags||[],
            type:eff.type||(eff.done!==undefined?'task':'event'),
            body:eff.body||node.body,
            recur:true,_nodeId:node.id,_node:node,
          });
        }
      }
    }
  } else if(node.repeat.type==='after_completion'){
    // Collect all occurrences with their own done state
    const allTimes=[];
    // Anchor done state: check instance override first
    const anchorInst=(node.instances||[]).find(i=>{
      const t=nodeDateTime(i)||parseDateString(i.date);
      return t&&Math.abs(t.getTime()-anchor.getTime())<60000;
    });
    // Only emit anchor if it isn't excluded
    if(!anchorInst?.excluded){
      allTimes.push({jsTime:anchor, done:anchorInst!==undefined?anchorInst.done:node.done, priority:anchorInst?.priority||node.priority});
    }
    // Other instances
    for(const inst of (node.instances||[])){
      const t=nodeDateTime(inst)||parseDateString(inst.date);
      if(!t||inst.excluded)continue;
      if(Math.abs(t.getTime()-anchor.getTime())<60000)continue;
      allTimes.push({jsTime:t, done:inst.done, priority:inst.priority||node.priority});
    }
    allTimes.sort((a,b)=>a.jsTime-b.jsTime);

    // Emit all recorded occurrences in range
    for(const entry of allTimes){
      if(entry.jsTime>=from&&entry.jsTime<=to){
        const spec=jsDateToSpec(entry.jsTime);
        occurrences.push({
          title:node.title, date:spec.date, time:spec.time||node.time||null,
          timezone:node.timezone, jsTime:entry.jsTime, done:entry.done,
          tags:node.tags||[], type:'task', priority:entry.priority, body:node.body,
          recur:true, _nodeId:node.id, _node:node
        });
      }
    }
    // Emit next pending occurrence
    const lastDone=[...allTimes].reverse().find(e=>e.done===true);
    if(lastDone){
      const nextJsTime=addInterval(lastDone.jsTime, node.repeat.interval||'1 day');
      const alreadyExists=allTimes.some(e=>Math.abs(e.jsTime.getTime()-nextJsTime.getTime())<60000);
      if(!alreadyExists&&nextJsTime>=from&&nextJsTime<=to){
        const spec=jsDateToSpec(nextJsTime);
        occurrences.push({
          title:node.title, date:spec.date, time:spec.time||node.time||null,
          timezone:node.timezone, jsTime:nextJsTime, done:false,
          tags:node.tags||[], type:'task', priority:node.priority, body:node.body,
          recur:true, _nodeId:node.id, _node:node
        });
      }
    }
  }

  // Tree expansion: child nodes with their own repeat (§9.3)
  for(const child of (node.instances||[])){
    if(child.repeat){
      const effChild=mergeNode(node,child);
      occurrences.push(...expandNode({...effChild,instances:[]},from,to));
    }
  }

  return occurrences;
}

function expandRange(from, to){
  const all=[];
  for(const node of NODES){
    if(node.multiday){
      let d=parseDateString(node.multiday.start||node.date);
      if(!d)continue;
      d=new Date(d);d.setHours(0,0,0,0);
      const endD=parseDateString(node.multiday.end);
      if(!endD)continue;
      const endDt=new Date(endD);endDt.setHours(23,59,59);
      while(d<=endDt){
        if(d>=from&&d<=to){
          const spec=jsDateToSpec(d);
          all.push({...node,date:spec.date,time:null,jsTime:new Date(d),_nodeId:node.id,_node:node,recur:false});
        }
        d=addDays(d,1);
      }
    } else if(node.repeat){
      all.push(...expandNode(node,from,to));
    } else {
      const t=nodeDateTime(node);
      if(t&&t>=from&&t<=to){
        all.push({...node,jsTime:t,_nodeId:node.id,_node:node,recur:false});
      }
    }
  }
  const seen=new Set();
  return all.filter(o=>{
    if(!o.jsTime)return false;
    const k=`${o._nodeId||o.title}|${o.jsTime.getTime()}`;
    if(seen.has(k))return false;seen.add(k);return true;
  }).sort((a,b)=>a.jsTime-b.jsTime);
}


// Parse duration string to decimal hours — handles "2h", "90m", "1h 30m", "1.5h"
function parseDurationHours(dur){
  if(!dur)return 0.75; // default slot height
  const s=String(dur).toLowerCase().trim();
  let h=0, m=0;
  const hm=s.match(/(\d+(?:\.\d+)?)\s*h/);
  const mm=s.match(/(\d+)\s*m/);
  if(hm)h=parseFloat(hm[1]);
  if(mm)m=parseInt(mm[1]);
  if(!hm&&!mm){
    // bare number — assume hours
    const n=parseFloat(s);
    if(!isNaN(n))h=n;
  }
  const total=h+m/60;
  return total>0?total:0.75;
}

// ── AGENDA ──────────────────────────────────────────────────────
// ── SHARED OCCURRENCE SORT ────────────────────────────────────
// Used by agenda, month, and day view. Sort order:
//   1. done/type bucket (undone events first, done last)
//   2. priority (high → medium → low → none)
//   3. time of day
//   4. title alphabetically
const _prioOrder={high:0,medium:1,low:2};
function _sortKey(o){
  const t=!!fmtT(o.time),ev=o.type==='event';
  return(o.done?8:0)+(t?0:2)+(ev?0:1);
}
function _prioKey(o){return o.priority?_prioOrder[o.priority]??3:3;}
function sortOccs(arr){
  return arr.sort((a,b)=>{
    const sd=_sortKey(a)-_sortKey(b);if(sd)return sd;
    const pd=_prioKey(a)-_prioKey(b);if(pd)return pd;
    const td=(a.jsTime?.getHours()||0)*60+(a.jsTime?.getMinutes()||0)
            -(b.jsTime?.getHours()||0)*60-(b.jsTime?.getMinutes()||0);
    if(td)return td;
    return(a.title||'').localeCompare(b.title||'');
  });
}

function buildAgenda(){
  const from=addDays(TODAY,-7),to=addDays(TODAY,90);
  const occs=expandRange(from,to);
  const el=document.getElementById('agContent');el.innerHTML='';
  const groups={};
  occs.forEach(o=>{
    if(o.multiday&&!sameDay(o.jsTime,new Date(o.multiday.start)))return; // show banner only on start day
    const k=dayKey(o.jsTime);
    if(!groups[k])groups[k]={date:new Date(o.jsTime.getFullYear(),o.jsTime.getMonth(),o.jsTime.getDate()),items:[]};
    groups[k].items.push(o);
  });
  // Also add multiday banners
  occs.filter(o=>o.multiday).forEach(o=>{
    const k=dayKey(new Date(o.multiday.start));
    if(!groups[k])groups[k]={date:new Date(o.multiday.start),items:[]};
    if(!groups[k].items.find(x=>x._nodeId===o._nodeId&&x.multiday))groups[k].items.push({...o,_isBanner:true});
  });

  Object.keys(groups).sort().forEach(k=>{
    const g=groups[k];
    const isT=sameDay(g.date,TODAY);
    const sec=document.createElement('div');
    sec.className='day-section';sec.dataset.key=k;
    const lbl=document.createElement('div');
    lbl.className=`day-lbl${isT?' tl':''}`;
    lbl.textContent=isT?'Today':sameDay(g.date,addDays(TODAY,1))?'Tomorrow':fmtLong(g.date);
    sec.appendChild(lbl);

    // multiday banners
    const banners=g.items.filter(o=>o.multiday&&!o._isBanner===false);
    const mdSeen=new Set();
    g.items.filter(o=>o.multiday).forEach(o=>{
      if(mdSeen.has(o._nodeId))return;mdSeen.add(o._nodeId);
      const b=document.createElement('div');b.className='multiday-banner';
      b.innerHTML=`<i data-lucide="calendar-range"></i>${o.title} <span style="opacity:.55;font-size:10px;margin-left:4px">${fmtShort(parseDateString(o.multiday.start))}–${fmtShort(parseDateString(o.multiday.end))}</span>`;
      b.onclick=()=>openEntry(o);sec.appendChild(b);
    });

    // sort: timed-event → timed-task → allday-event → allday-task, done to bottom
    const nonMd=g.items.filter(o=>!o.multiday);
    sortOccs(nonMd);
    nonMd.forEach((o,i)=>sec.appendChild(makeOccRow(o,i)));
    el.appendChild(sec);
  });
  ic();
}

// Single source of truth for occurrence state — used by all three views
function occState(o){
  if(o.done)return 'done';
  if(o.type==='task'||o.done!==undefined){
    const p=o.priority;
    if(p==='high')return 'task-p1';
    if(p==='medium')return 'task-p2';
    if(p==='low')return 'task-p3';
    return 'task-open';
  }
  if(o.multiday)return 'event-future';
  const now=new Date();
  if(o.jsTime<now)return 'event-past';
  return 'event-future';
}
function barClass(o){return occState(o);}
function ccBarClass(o){
  if(o.multiday)return 'multiday';
  const s=occState(o);
  if(s==='done'||s==='event-past')return 'done';
  if(s==='task-open')return 'task';
  if(s==='task-p1')return 'task-p1';
  if(s==='task-p2')return 'task-p2';
  if(s==='task-p3')return 'task-p3';
  return 'event';
}
function dvBlkClass(o){
  const s=occState(o);
  if(s==='done'||s==='event-past')return 'past';
  if(s==='task-open')return 'task';
  if(s==='task-p1')return 'task-p1';
  if(s==='task-p2')return 'task-p2';
  if(s==='task-p3')return 'task-p3';
  return 'event';
}

function makeOccRow(o,idx){
  // Outer swipe wrapper — holds hint layers + the sliding row
  const wrap=document.createElement('div');
  wrap.className='swipe-wrap';
  wrap.style.animationDelay=(idx*.025)+'s';
  wrap.style.animation='fadeUp .16s ease both';

  // Only left (delete) hint
  const hintL=document.createElement('div');
  hintL.className='swipe-hint left';
  hintL.style.display='none';
  hintL.innerHTML=`<i data-lucide="trash-2"></i><span>Delete</span>`;
  wrap.appendChild(hintL);

  // The actual row (slides on top)
  const row=document.createElement('div');
  row.className=`swipe-row occ-row${o.done?' is-done':''}`;
  row._occ=o; // store occurrence for FLIP resort
  const t=fmtT(o.time);
  const hasTrack=o.done!==undefined;
  row.innerHTML=
    `<div class="occ-left">`+
      `<span class="occ-time${t?' timed':''}">${t||''}</span>`+
      (o.duration&&t?`<span class="occ-dur-small">${o.duration}</span>`:'')+
    `</div>`+
    `<span class="occ-bar ${barClass(o)}"></span>`+
    `<div class="occ-body">`+
      `<div class="occ-tr">`+
        (hasTrack?`<div class="occ-chk${o.done?' done':''}" style="flex-shrink:0"><i data-lucide="check"></i></div>`:'')+
        `<span class="occ-title${o.done?' done-t':''}">${o.title}</span>`+
        (o.recur?`<span class="orecur"><i data-lucide="repeat-2"></i></span>`:'')+
      `</div>`+
      ((o.tags||[]).length?
        `<div class="occ-meta">`+
          (o.tags||[]).slice(0,2).map(tg=>`<span class="otag${o.type==='event'?' ev':''}">${tg}</span>`).join('')+
        `</div>`
      :'')+
    `</div>`;

  const chk=row.querySelector('.occ-chk');
  if(chk)chk.addEventListener('click',e=>{e.stopPropagation();toggleOccDone(o,row);});
  row.addEventListener('click',e=>{if(!e.target.closest('.occ-chk'))openEntry(o);});

  // Swipe gesture — left only, full swipe to delete
  const THRESHOLD=72;
  const FULL_FRAC=0.5;
  let sx=0,sy=0,tracking=false,blocked=false;

  row.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
    tracking=false;blocked=false;
    row.style.animation='none';
    row.style.transition='none';
  },{passive:true});

  row.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-sx;
    const dy=e.touches[0].clientY-sy;
    if(!tracking){
      if(Math.abs(dy)>Math.abs(dx)){blocked=true;return;}
      if(dx>0){blocked=true;return;} // ignore right swipe entirely
      tracking=true;
    }
    if(blocked)return;
    e.preventDefault();
    const rowW=wrap.offsetWidth||320;
    const absDx=Math.abs(dx);
    const clamped=Math.max(dx,-rowW);
    row.style.transform=`translateX(${clamped}px)`;
    if(dx<-8){
      hintL.style.display='flex';
      const fullPx=rowW*FULL_FRAC;
      const prog=Math.min(absDx/fullPx,1);
      const isFullReady=absDx>=fullPx;
      hintL.style.filter=`saturate(${0.3+prog*0.7})`;
      hintL.style.opacity=String(0.4+prog*0.6);
      const iconEl=hintL.querySelector('svg');
      if(iconEl)iconEl.style.transform=isFullReady?'scale(1.3)':'scale('+(0.7+prog*0.3)+')';
    } else {
      hintL.style.display='none';
    }
  },{passive:false});

  row.addEventListener('touchend',e=>{
    if(blocked||!tracking){
      row.style.transition='';row.style.transform='';
      hintL.style.display='none';
      return;
    }
    const dx=e.changedTouches[0].clientX-sx;
    const rowW=wrap.offsetWidth||320;
    const isFull=Math.abs(dx)/rowW>=FULL_FRAC;
    hintL.style.display='none';
    hintL.style.filter='';hintL.style.opacity='';
    row.style.transition='transform .28s cubic-bezier(.4,0,.2,1)';
    if(dx<=-THRESHOLD&&isFull){
      row.style.transform=`translateX(-${rowW}px)`;
      setTimeout(()=>{
        wrap.style.height=wrap.offsetHeight+'px';
        wrap.style.overflow='hidden';
        requestAnimationFrame(()=>{
          wrap.style.transition='height .2s ease,opacity .2s ease';
          wrap.style.height='0';wrap.style.opacity='0';
        });
        setTimeout(doDelete,220);
      },260);
    } else {
      row.style.transform='';
    }
  },{passive:true});

  function doDelete(){
    const node=o._node||o;
    const nodeId=node.id;
    const title=node.title;

    if(o.recur){
      // Prepare excluded instance — add it now so item disappears, undo removes it
      if(!node.instances)node.instances=[];
      const occDate=o.date;
      let inst=node.instances.find(i=>i.date===occDate&&!i.time);
      if(inst){inst.excluded=true;}
      else{node.instances.push({date:occDate,excluded:true});}
      buildAgenda();buildMonth();

      showDeleteToast(title,
        ()=>{ writeEntityToCache(node); }, // commit: write to disk
        ()=>{ // undo: remove the excluded instance
          if(inst){delete inst.excluded;}
          else{node.instances=node.instances.filter(i=>!(i.date===occDate&&i.excluded&&!i.time));}
          buildAgenda();buildMonth();
        }
      );
    } else {
      // Remove from NODES now so item disappears immediately
      NODES=NODES.filter(n=>n.id!==nodeId);
      buildAgenda();buildMonth();

      showDeleteToast(title,
        ()=>{ deleteNodeFromDisk(node); }, // commit: delete file
        ()=>{ // undo: restore node
          NODES.push(node);
          NODES.sort((a,b)=>(parseDateString(a.date)||0)-(parseDateString(b.date)||0));
          buildAgenda();buildMonth();
        }
      );
    }
  }

  wrap.appendChild(row);
  return wrap;
}

function toggleOccDone(o, rowEl){
  const newDone=!o.done;
  o.done=newDone; // update the occurrence object in place
  const node=o._node;
  if(!node)return;
  if(!node.instances)node.instances=[];
  const jsT=o.jsTime;
  if(node.repeat){
    let inst=node.instances.find(i=>{
      const t=nodeDateTime(i)||parseDateString(i.date);
      return t&&Math.abs(t.getTime()-jsT.getTime())<60000;
    });
    if(inst){inst.done=newDone;}
    else{node.instances.push({date:o.date, done:newDone});}
  } else {
    node.done=newDone;
  }
  writeEntityToCache(node);

  // Update only the affected row in place — no rebuilds, no icon flash
  if(rowEl&&node.repeat?.type!=='after_completion'){
    rowEl.classList.toggle('is-done', newDone);
    const chk=rowEl.querySelector('.occ-chk');
    if(chk)chk.classList.toggle('done', newDone);
    const title=rowEl.querySelector('.occ-title');
    if(title)title.classList.toggle('done-t', newDone);
    const bar=rowEl.querySelector('.occ-bar');
    if(bar)bar.className='occ-bar '+barClass(o);

    // FLIP: resort the day section this item belongs to, animating all rows
    const daySection=rowEl.closest('.day-section');
    if(daySection)flipResortSection(daySection);
  } else {
    buildAgenda();buildMonth();ic();
  }
}

// ── FLIP RESORT ─────────────────────────────────────────────
function flipResortSection(section){
  const wraps=[...section.querySelectorAll('.swipe-wrap')];
  if(wraps.length<2)return;

  // Cancel fadeUp on wraps AND inner rows before reading positions —
  // fadeUp is set as inline style on wrap AND via CSS class on occ-row,
  // both use fill-mode:both which holds transform and corrupts getBoundingClientRect()
  wraps.forEach(w=>{
    w.style.animation='none';
    const row=w.querySelector('.swipe-row');
    if(row){row.style.animation='none';row.style.transform='';}
  });

  // FIRST: record positions (now accurate — no animation transform)
  const firsts=new Map();
  wraps.forEach(w=>firsts.set(w,w.getBoundingClientRect().top));

  // Sort and reorder DOM using shared sort functions
  const pairs=wraps.map(w=>{
    const row=w.querySelector('.swipe-row');
    const occ=row?._occ;
    return{w,occ,key:occ?_sortKey(occ):0,i:0};
  });
  pairs.forEach((p,i)=>p.i=i);
  pairs.sort((a,b)=>{
    if(a.key!==b.key)return a.key-b.key;
    const pd=_prioKey(a.occ??{})-_prioKey(b.occ??{});if(pd)return pd;
    if(a.occ&&b.occ)return(a.occ.title||'').localeCompare(b.occ.title||'');
    return a.i-b.i;
  });
  const parent=wraps[0].parentNode;
  pairs.forEach(({w})=>parent.appendChild(w));

  // LAST + INVERT: compute deltas, apply inverse transforms with no transition
  wraps.forEach(w=>{
    const dy=firsts.get(w)-w.getBoundingClientRect().top;
    if(Math.abs(dy)<1)return;
    w.style.transition='none';
    w.style.transform=`translateY(${dy}px)`;
  });

  // Force reflow — commits invert transforms to render tree
  // eslint-disable-next-line no-unused-expressions
  section.offsetHeight;

  // PLAY — must be in next rAF so browser has painted the inverted position
  requestAnimationFrame(()=>{
    wraps.forEach(w=>{
      if(!w.style.transform)return;
      w.style.transition='transform .35s cubic-bezier(.4,0,.2,1)';
      w.style.transform='';
      w.addEventListener('transitionend',()=>{w.style.transition='';},{once:true});
    });
  });
}
function buildMonth(){
  const m=calMonth.getMonth(),y=calMonth.getFullYear();
  document.getElementById('mTitle').innerHTML=`<em>${MONTHS[m]}</em> ${y}`;
  document.getElementById('dowRow').innerHTML=DAYS.map(d=>`<div class="dow-c">${d}</div>`).join('');
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const rawFirst=new Date(y,m,1).getDay();
  const first=(rawFirst+6)%7;
  const dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();

  const from=new Date(y,m,1),to=new Date(y,m+1,0,23,59,59);
  const occs=expandRange(from,to);

  for(let i=first-1;i>=0;i--)grid.appendChild(makeCalCell(new Date(y,m-1,prev-i),true,occs));
  for(let d=1;d<=dim;d++)grid.appendChild(makeCalCell(new Date(y,m,d),false,occs));
  const nc=(7-(first+dim)%7)%7;
  for(let d=1;d<=nc;d++)grid.appendChild(makeCalCell(new Date(y,m+1,d),true,occs));
  ic();
}

function makeCalCell(date,other,occs){
  const isT=sameDay(date,TODAY);
  const dayOccs=sortOccs((occs||[]).filter(o=>sameDay(o.jsTime,date)));
  const cell=document.createElement('div');
  cell.className=`cal-cell${other?' other':''}${isT?' istoday':''}`;
  const seen=new Set();let bars='';
  dayOccs.slice(0,4).forEach(o=>{
    if(o.multiday){if(seen.has(o._nodeId))return;seen.add(o._nodeId);bars+=`<div class="cc-bar multiday">${o.title}</div>`;}
    else bars+=`<div class="cc-bar ${ccBarClass(o)}">${o.title}</div>`;
  });
  if(dayOccs.length>4)bars+=`<div class="cc-more">+${dayOccs.length-4}</div>`;
  cell.innerHTML=`<span class="ccn">${date.getDate()}</span><div class="cc-bars">${bars}</div>`;
  cell.onclick=()=>{dvDate=date;buildDayView();pushView('day');};
  return cell;
}
function chMonth(d){calMonth.setMonth(calMonth.getMonth()+d);buildMonth();}

// ── DAY VIEW ──────────────────────────────────────────────────
function buildDayView(){
  document.getElementById('dvTitle').textContent=fmtLong(dvDate);
  const from=new Date(dvDate);from.setHours(0,0,0,0);
  const to=new Date(dvDate);to.setHours(23,59,59);
  const occs=expandRange(from,to);
  const allday=occs.filter(o=>!fmtT(o.time)||o.multiday);
  const timed=occs.filter(o=>!!fmtT(o.time)&&!o.multiday);

  // Sort all-day items using shared sort
  sortOccs(allday);
  sortOccs(timed);

  const ad=document.getElementById('dvAllDay');
  if(allday.length){
    ad.style.display='';
    const seen=new Set();
    ad.innerHTML=`<div class="dv-adlbl">All day</div>`;
    allday.forEach(o=>{
      if(o.multiday&&seen.has(o._nodeId))return;
      if(o.multiday)seen.add(o._nodeId);
      const hasTrack=o.done!==undefined;
      const it=document.createElement('div');
      it.className=`dv-aditem ${o.multiday?'multiday':dvBlkClass(o)}`;
      const chkHtml=hasTrack?`<div class="dv-chk${o.done?' done':''}"><i data-lucide="check"></i></div>`:'';
      it.innerHTML=chkHtml+`<span>${o.title}</span>`;
      it.onclick=()=>openEntry(o);
      ad.appendChild(it);
    });
  } else {ad.style.display='none';}

  const tl=document.getElementById('dvTl');tl.innerHTML='';
  const SH=7,EH=22,HP=56;
  for(let h=SH;h<=EH;h++){
    const row=document.createElement('div');row.className='dv-hr';
    row.innerHTML=`<span class="dv-hlbl">${h<12?h+'am':h===12?'12pm':(h-12)+'pm'}</span><div class="dv-hline"></div>`;
    tl.appendChild(row);
  }
  if(sameDay(dvDate,TODAY)){
    const now=new Date(),nh=now.getHours()+now.getMinutes()/60;
    if(nh>=SH&&nh<=EH){
      const nl=document.createElement('div');nl.className='now-line';nl.style.top=((nh-SH)*HP)+'px';nl.innerHTML='<div class="now-dot"></div>';tl.appendChild(nl);
    }
  }
  // Layout overlapping timed events into columns
  // Group events that overlap in time
  function computeColumns(events){
    // Sort by start time
    const sorted=[...events].sort((a,b)=>a.jsTime-b.jsTime);
    const cols=[];
    for(const ev of sorted){
      const dh=parseDurationHours(ev.duration);
      const endMs=ev.jsTime.getTime()+dh*3600000;
      ev._dh=dh;ev._endMs=endMs;
      // Find first column where this event doesn't overlap with last event
      let placed=false;
      for(const col of cols){
        const last=col[col.length-1];
        if(ev.jsTime.getTime()>=last._endMs){col.push(ev);placed=true;break;}
      }
      if(!placed)cols.push([ev]);
    }
    return cols;
  }

  const cols=computeColumns(timed);
  const totalCols=Math.max(cols.length,1);
  // Get actual timeline width from the dv-hline element
  const hline=tl.querySelector('.dv-hline');
  const tlLeft=50; // px offset for hour labels
  const tlRight=6;
  // We'll position after paint using requestAnimationFrame
  const pendingBlks=[];
  cols.forEach((col,ci)=>{
    col.forEach(o=>{
      const h=o.jsTime.getHours()+o.jsTime.getMinutes()/60;
      if(h<SH||h>EH)return;
      const blk=document.createElement('div');
      blk.className=`dv-eblk ${dvBlkClass(o)}`;
      blk.style.top=((h-SH)*HP+1)+'px';
      blk.style.height=Math.max(o._dh*HP-4,28)+'px';
      blk.dataset.col=ci;
      blk.dataset.totalCols=totalCols;
      const hasTrack=o.done!==undefined;
      const chkHtml=hasTrack?`<div class="dv-blk-chk${o.done?' done':''}"><i data-lucide="check"></i></div>`:'';
      blk.innerHTML=`<div class="dv-et">${chkHtml}${o.title}</div><div class="dv-em">${fmtT(o.time)}${o.duration?' · '+o.duration:''}</div>`;
      blk.onclick=()=>openEntry(o);
      tl.appendChild(blk);
    });
  });
  // After paint: compute column widths from actual element width
  requestAnimationFrame(()=>{
    const tlW=tl.getBoundingClientRect().width||380;
    const avail=tlW-tlLeft-tlRight;
    const slotW=Math.floor(avail/totalCols);
    tl.querySelectorAll('.dv-eblk').forEach(blk=>{
      const ci=parseInt(blk.dataset.col||0);
      const tc=parseInt(blk.dataset.totalCols||1);
      blk.style.left=(tlLeft+ci*Math.floor(avail/tc))+'px';
      blk.style.right='';
      blk.style.width=(Math.floor(avail/tc)-3)+'px';
    });
    ic();
  });
  setTimeout(()=>document.getElementById('dvSc').scrollTo({top:(8-SH)*HP,behavior:'instant'}),50);
  ic();
}

// ── SEARCH ──────────────────────────────────────────────────────
function buildNS(filter,q=''){
  if(filter!==undefined)nsFilterVal=filter;
  const list=document.getElementById('nsList');list.innerHTML='';
  const q2=(q||document.getElementById('nsIn')?.value||'').toLowerCase();
  const occs=expandRange(addDays(TODAY,-30),addDays(TODAY,90));
  const seen=new Set();
  const allItems=[
    ...NOTES_DATA,
    ...occs.filter(o=>{if(seen.has(o._nodeId||o.title))return false;seen.add(o._nodeId||o.title);return true;})
      .map(o=>({title:o.title,preview:o.body||'',date:fmtShort(o.jsTime),tags:o.tags||[],type:o.type,_node:o._node||o}))
  ];
  const filtered=allItems.filter(it=>{
    if(nsFilterVal!=='all'&&it.type!==nsFilterVal)return false;
    if(q2&&!it.title.toLowerCase().includes(q2)&&!it.preview.toLowerCase().includes(q2)&&!it.tags.some(t=>t.includes(q2)))return false;
    return true;
  });
  if(!filtered.length){list.innerHTML=`<div style="padding:40px 14px;text-align:center;color:var(--t3);font-size:13px">No results</div>`;return;}
  const grps={event:[],task:[],note:[]};
  filtered.forEach(it=>{if(grps[it.type])grps[it.type].push(it);});
  const order=nsFilterVal==='all'?['event','task','note']:[nsFilterVal];
  order.forEach(t=>{
    const items=grps[t]||[];if(!items.length)return;
    if(nsFilterVal==='all'){const l=document.createElement('div');l.className='ns-sec';l.textContent=t==='event'?'Events':t==='task'?'Tasks':'Notes';list.appendChild(l);}
    items.forEach(it=>{
      const row=document.createElement('div');row.className='note-row';
      row.innerHTML=`<div class="nr-t">${it.title}</div><div class="nr-p">${it.preview||''}</div><div class="nr-m"><span class="nr-d">${it.date}</span>${(it.tags||[]).slice(0,2).map(t=>`<span class="otag">${t}</span>`).join('')}</div>`;
      row.onclick=()=>openEntry(it._node?it:it);list.appendChild(row);
    });
  });
}

function openEntry(item){

  openEntryDirect(item, item&&item.recur?'single':'all');

function openEntryDirect(item, editScope='all'){
  entryItem=item?{...item, _editScope:editScope}:null;
  // defaults: today, no time, track completion on
  entryScheduled=null;entryDuration='';entryTracked=true;entryRepeat=null;entryDone=false;entryTags=[];entryPriority=null;
  if(item){
    const root=item._node||item;
    document.getElementById('entryTitle').value=item.title||root.title||'';
    entryDuration=item.duration||root.duration||'';
    entryTracked=(item.done!==undefined)||(root.done!==undefined);
    entryDone=item.done||false;
    entryTags=[...(item.tags||root.tags||[])];
    entryPriority=item.priority||root.priority||null;
    document.getElementById('entryFname').textContent=((root.id||item.title||'untitled')+'.md').toLowerCase().replace(/\s+/g,'-');
    renderBodyContent(item.body||root.body||'');
    // Time + repeat depend on the edit scope — applied below
    applyScopeToFields(editScope);
  } else {
    // new item defaults
    document.getElementById('entryTitle').value='';
    document.getElementById('entryFname').textContent='untitled.md';
    document.getElementById('entryBody').innerHTML='';
    entryScheduled={date:fmtISO(TODAY),time:''}; // default to today
  }
  autoResize(document.getElementById('entryTitle'));
  document.getElementById('deleteBtn').style.display=item?'flex':'none';
  // Show scope selector only for recurring items
  const isRecur=!!(item&&(item.recur||item._node?.repeat||item.repeat));
  const scopeRow=document.getElementById('scopeRow');
  scopeRow.style.display=isRecur?'flex':'none';
  if(isRecur){
    document.getElementById('scopeSelect').value=editScope;
  }
  refreshEntryUI();
  pushView('entry');
  setTimeout(()=>ic(),80);
}

// Set time + repeat fields based on the chosen edit scope
function applyScopeToFields(scope){
  if(!entryItem)return;
  const item=entryItem;
  const root=item._node||item;
  // occurrence's date/time as strings
  const occDate=item.date||root.date||null;
  const occTime=item.time||root.time||null;
  // root's date/time as strings
  const rootDate=root.date||null;
  const rootTime=root.time||null;

  if(scope==='single'){
    entryScheduled=occDate?{date:occDate,time:occTime||''}:null;
    entryRepeat=null;
  } else if(scope==='future'){
    entryScheduled=occDate?{date:occDate,time:occTime||''}:null;
    entryRepeat=root.repeat||null;
  } else {
    entryScheduled=rootDate?{date:rootDate,time:rootTime||''}:null;
    entryRepeat=root.repeat||null;
  }
}

function renderBodyContent(text){
  const body=document.getElementById('entryBody');
  const html=text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,(m,ref,label)=>{
    const target=NODES.find(n=>n.title.toLowerCase()===ref.toLowerCase());
    return `<span class="${target?'wl':'wl-broken'}" data-ref="${ref}">[[${label||ref}]]</span>`;
  }).replace(/\n/g,'<br>');
  body.innerHTML=html;
}

function refreshEntryUI(){

  document.getElementById('sumPriority').textContent=entryPriority?pLabels[entryPriority]:'';

  // Repeat chip — hidden when no date+no tracking, or when single scope

function setScope(scope){

function toggleDoneEntry(){entryDone=!entryDone;document.getElementById('echk').classList.toggle('on',entryDone);}

function addTag(){const t=prompt('Tag:');if(t){entryTags.push(t.trim());refreshEntryUI();}}

function buildFields(){
  const f={
    title:document.getElementById('entryTitle').value.trim(),
    tags:[...entryTags],
    body:document.getElementById('entryBody').innerText.trim()||undefined
  };
  if(entryTracked){f.done=entryDone;if(entryPriority)f.priority=entryPriority;}
  if(entryScheduled&&entryScheduled.date){
    f.date=entryScheduled.date;
    f.time=entryScheduled.time||undefined; // "HH:MM" string or undefined
    f.duration=entryDuration||undefined;
  }
  if(entryRepeat)f.repeat=entryRepeat;
  return f;
}

function saveEntry(){
  const title=document.getElementById('entryTitle').value.trim();if(!title)return;
  const scope=entryItem?._editScope||'all';
  const rootNode=entryItem?(entryItem._node||entryItem):null;
  const existingIdx=rootNode?NODES.findIndex(n=>n===rootNode||(n.id&&n.id===rootNode.id)):-1;
  const isNew=existingIdx<0;

  if(isNew){
    const f=buildFields();
    const node={id:'node-'+nextId++, ...f};
    if(!entryTracked)delete node.done;
    if(!entryScheduled){delete node.date;delete node.time;delete node.duration;}
    node.repeat=entryRepeat||undefined;
    NODES.push(node);
    writeEntityToCache(node);
    buildAgenda();buildMonth();
    closeEntry();
    return;
  }

  const node=NODES[existingIdx];

  if(scope==='all'||!node.repeat){
    // Edit all: update top-level fields only — preserve all instance overrides as-is
    const f=buildFields();
    Object.assign(node, f);
    if(!entryTracked)delete node.done;
    if(!entryScheduled){delete node.date;delete node.time;delete node.duration;}
    if(entryRepeat)node.repeat=entryRepeat; else delete node.repeat;
    if(node.tags&&node.tags.length===0)delete node.tags;
    writeEntityToCache(node);

  } else if(scope==='single'){
    // Edit single occurrence per spec §7.2 — only write fields that differ from root
    const occDate=entryItem.date;
    const occTime=entryItem.time||undefined;
    const f=buildFields();
    const newDate=f.date;
    const newTime=f.time||undefined;
    const isRescheduled=newDate!==occDate||(newTime&&newTime!==occTime);

    if(!node.instances)node.instances=[];
    if(isRescheduled){
      // Exclude original slot
      let excl=node.instances.find(i=>i.date===occDate&&(!i.time||i.time===occTime));
      if(excl){excl.excluded=true;delete excl.done;}
      else{node.instances.push({date:occDate,excluded:true});}
      // New one-off at new date/time — only non-identical fields
      const newInst={date:newDate};
      if(newTime)newInst.time=newTime;
      if(f.title!==node.title)newInst.title=f.title;
      if(f.body!==node.body)newInst.body=f.body;
      if(f.tags?.length&&JSON.stringify(f.tags)!==JSON.stringify(node.tags))newInst.tags=f.tags;
      if(f.duration!==node.duration)newInst.duration=f.duration;
      if(entryTracked&&f.done!==undefined)newInst.done=f.done;
      if(entryTracked&&f.priority!==node.priority)newInst.priority=f.priority||undefined;
      node.instances.push(newInst);
    } else {
      // Non-rescheduled override — find or create, then set/delete fields
      let inst=node.instances.find(i=>i.date===occDate&&(!i.time||i.time===occTime));
      if(!inst){inst={date:occDate};if(occTime)inst.time=occTime;node.instances.push(inst);}
      // Set fields that differ from root
      if(f.title!==node.title)inst.title=f.title; else delete inst.title;
      if(f.body!==node.body)inst.body=f.body; else delete inst.body;
      if(f.tags?.length&&JSON.stringify(f.tags)!==JSON.stringify(node.tags))inst.tags=f.tags; else delete inst.tags;
      if(f.duration!==node.duration)inst.duration=f.duration; else delete inst.duration;
      if(entryTracked&&f.done!==undefined)inst.done=f.done; else delete inst.done;
      if(entryTracked&&f.priority!==node.priority)inst.priority=f.priority||undefined; else delete inst.priority;
      // If the instance now has no overrides beyond date/time, it's a no-op — but keep it (harmless)
    }
    writeEntityToCache(node);

  } else if(scope==='future'){
    // Edit this and future per spec
    const occDate=entryItem.date;
    const occJsDate=parseDateString(occDate);
    const untilDate=new Date(occJsDate);untilDate.setDate(untilDate.getDate()-1);
    if(!node.repeat.scheduled)node.repeat.scheduled={};
    node.repeat.scheduled.end={type:'until',date:fmtISO(untilDate)};
    // Remove instances on or after this date
    if(node.instances){
      node.instances=node.instances.filter(i=>{
        const t=parseDateString(i.date||'9999-01-01');
        return !t||t<occJsDate;
      });
    }
    const f=buildFields();
    const newChild={date:f.date||occDate};
    if(f.time)newChild.time=f.time;
    if(f.title!==node.title)newChild.title=f.title;
    if(JSON.stringify(f.tags)!==JSON.stringify(node.tags))newChild.tags=f.tags;
    if(f.duration!==node.duration)newChild.duration=f.duration;
    if(f.body!==node.body)newChild.body=f.body;
    if(entryRepeat)newChild.repeat=entryRepeat;
    if(entryTracked&&f.done!==undefined)newChild.done=f.done;
    Object.keys(newChild).forEach(k=>{if(newChild[k]===undefined)delete newChild[k];});
    if(!node.instances)node.instances=[];
    node.instances.push(newChild);
    writeEntityToCache(node);
  }

  buildAgenda();buildMonth();
  closeEntry();
}

function deleteEntry(){
  if(!entryItem)return;
  const node=entryItem._node||entryItem;
  const nodeId=node.id;
  if(node.repeat){
    const sheet=document.getElementById('seriesSheet');
    document.getElementById('seriesSheetTitle').textContent=`Delete "${node.title}"`;
    document.getElementById('seriesOpt1').onclick=()=>{
      if(!node.instances)node.instances=[];
      const occDate=entryItem.date||node.date;
      let inst=node.instances.find(i=>i.date===occDate);
      if(inst){inst.excluded=true;}
      else{node.instances.push({date:occDate,excluded:true});}
      writeEntityToCache(node);
      closeSeriesSheet();buildAgenda();buildMonth();closeEntry();
    };
    document.getElementById('seriesOpt2').onclick=()=>{
      NODES=NODES.filter(n=>n.id!==nodeId);
      deleteNodeFromDisk(node); // remove file from disk
      closeSeriesSheet();buildAgenda();buildMonth();closeEntry();
    };
    sheet.classList.add('open');ic();
  } else {
    if(!confirm(`Delete "${node.title}"?`))return;
    NODES=NODES.filter(n=>n.id!==nodeId);
    deleteNodeFromDisk(node); // remove file from disk
    buildAgenda();buildMonth();closeEntry();
  }
}

function buildRepeatDlg(hasSched,hasTrk){

function buildRepeatConfig(){
