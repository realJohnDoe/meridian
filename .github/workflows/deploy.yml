name: Deploy to GitHub Pages

on:
  push:
    # TODO(temporary): drop worktree-github-oauth-signin before merging to
    # main — added only to test the live OAuth flow against the real GitHub
    # Pages URL (redirect_uri and Worker CORS are both hardcoded to it).
    branches: [main, worktree-github-oauth-signin]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
