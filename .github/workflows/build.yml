name: Build & Test

on:
  workflow_call:

# Only contents: read needed here — upload-pages-artifact is just a
# compressed upload-artifact; deploy-pages (which needs pages: write
# and id-token: write) lives in the deploy workflow, not here.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      # build first: it regenerates src/routeTree.gen.ts (gitignored, produced
      # by the TanStack Router vite plugin). Type-aware lint rules need it —
      # running lint first left Route.useSearch()/useParams() unresolved on a
      # fresh checkout, causing spurious no-unsafe-* failures.
      - run: pnpm run build
      # worker-configuration.d.ts is gitignored and generated from wrangler.toml;
      # the worker's type-aware lint rules need it for the same reason routeTree.gen.ts
      # is needed above (Request/Response/Env resolve to `any` without it).
      - run: pnpm --filter meridian-oauth-worker run cf-typegen
      - run: pnpm run lint
      - run: pnpm run test:coverage
      - run: pnpm run knip
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
