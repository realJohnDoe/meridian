name: Build & Test

on:
  workflow_call:

# Only contents: read needed here — upload-pages-artifact is just a
# compressed upload-artifact; deploy-pages (which needs pages: write
# and id-token: write) lives in the deploy workflow, not here.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm test
      - run: pnpm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
