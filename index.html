<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <script>
      // Keep --app-h in sync with the visual viewport (shrinks when the
      // Android soft keyboard opens). Runs inline so the first paint is correct.
      function _setAppH() {
        var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-h', h + 'px');
      }
      if (window.visualViewport) window.visualViewport.addEventListener('resize', _setAppH);
      window.addEventListener('resize', _setAppH);
      _setAppH();
    </script>
    <title>Meridian</title>
    <link rel="icon" type="image/png" href="/icon-192.png">
    <link rel="shortcut icon" type="image/png" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">
  </head>

</html>
