# pnpm 11+ project settings

packages:
  - '.'
  - 'worker'

# ── Supply-chain protection ───────────────────────────────────────────────────
#
# minimumReleaseAge (minutes): pnpm refuses to install any package version
# published less than N minutes ago. The pnpm 11 default is 1440 (24 h).
# 1440 min = 24 h — gives the ecosystem time to flag hijacked releases while
# still allowing the esbuild security patch (GHSA-gv7w-rqvm-qjhr) to install.
minimumReleaseAge: 1440

# ── Dependency overrides ───────────────────────────────────────────────────────
# Force patched versions of vulnerable transitive dependencies.
# esbuild <0.28.1 has GHSA-gv7w-rqvm-qjhr (missing binary integrity in Deno
# module, RCE via NPM_CONFIG_REGISTRY). All paths run through vite.
# brace-expansion has GHSA-3jxr-9vmj-r5cp (DoS via exponential-time expansion
# of consecutive non-expanding {} groups). Pulled in transitively (dev-only,
# via vite-plugin-pwa and the eslint toolchain) at two vulnerable major lines.
# fast-uri <3.1.4 has GHSA-v2hh-gcrm-f6hx (host confusion via literal backslash
# authority delimiter) and <3.1.3 has GHSA-4c8g-83qw-93j6 (host confusion via
# failed IDN canonicalization). Pulled in transitively (dev-only) via ajv,
# itself nested inside vite-plugin-pwa's workbox-build dependency.
# sharp <0.35.0 inherits libvips CVEs (CVE-2026-33327/33328/35590/35591).
# Also pulled in transitively (dev-only) via wrangler's miniflare dependency.
overrides:
  esbuild: ">=0.28.1"
  brace-expansion@2: ">=2.1.2 <3.0.0"
  brace-expansion@5: ">=5.0.7 <6.0.0"
  fast-uri: ">=3.1.4"
  sharp: ">=0.35.0"

# allowBuilds: explicit allowlist for packages permitted to run install-time
# build scripts. Only add packages here after reviewing what the script does.
# esbuild  – compiles its Go-based JS bundler binary; required for Vite
# sharp    – compiles its libvips native image-processing binary; required for PWA icon gen
# workerd  – downloads Cloudflare's official Workers runtime binary; required for `wrangler dev`/`deploy`
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true
